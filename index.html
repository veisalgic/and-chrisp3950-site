<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miller's Bakery | Fresh Handcrafted Baked Goods – Johnson City</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:     #f9c9c9;
      --rose-dark:#e8a0a0;
      --cream:    #fdf6ee;
      --butter:   #fde9b8;
      --butter-dark:#f5c97a;
      --mint:     #c8e6d4;
      --mint-dark:#8ecbaa;
      --lavender: #ddd0f0;
      --brown:    #6b3f1f;
      --brown-light:#9e6340;
      --text:     #3d2b1f;
      --text-light:#7a5c47;
      --white:    #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(253,246,238,0.95);
      backdrop-filter: blur(6px);
      border-bottom: 2px solid var(--butter);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 2rem;
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 18px rgba(107,63,31,0.10); }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--brown);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .nav-logo span.icon { font-size: 1.6rem; }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--text-light);
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.25s;
    }
    .nav-links a:hover { color: var(--brown); }

    .nav-cta {
      background: var(--butter-dark);
      color: var(--brown) !important;
      padding: 0.45rem 1.2rem;
      border-radius: 50px;
      transition: background 0.25s, transform 0.2s !important;
    }
    .nav-cta:hover { background: var(--rose-dark) !important; transform: scale(1.04); }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 26px; height: 3px;
      background: var(--brown);
      border-radius: 3px;
      transition: all 0.3s;
    }

    /* ─── MOBILE MENU ─── */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--cream);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--brown);
      text-decoration: none;
      font-weight: 600;
    }
    .mobile-close {
      position: absolute;
      top: 1.2rem; right: 1.5rem;
      background: none; border: none;
      font-size: 2rem;
      color: var(--brown);
      cursor: pointer;
    }

    /* ─── HERO ─── */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--rose) 0%, var(--butter) 45%, var(--mint) 100%);
      padding: 7rem 1.5rem 4rem;
      text-align: center;
    }

    .hero-blobs {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      filter: blur(60px);
    }
    .blob1 { width: 420px; height: 420px; background: var(--rose); top: -80px; left: -100px; animation: float 8s ease-in-out infinite; }
    .blob2 { width: 340px; height: 340px; background: var(--butter); bottom: -60px; right: -80px; animation: float 10s ease-in-out infinite reverse; }
    .blob3 { width: 260px; height: 260px; background: var(--mint); top: 40%; left: 60%; animation: float 12s ease-in-out infinite 2s; }

    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.05); }
    }

    .hero-inner { position: relative; z-index: 1; max-width: 740px; }

    .hero-badge {
      display: inline-block;
      background: var(--white);
      color: var(--brown-light);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 1.1rem;
      border-radius: 50px;
      margin-bottom: 1.4rem;
      box-shadow: 0 2px 12px rgba(107,63,31,0.12);
      animation: fadeUp 0.7s ease both;
    }

    .hero-emoji { font-size: 3.5rem; margin-bottom: 0.6rem; display: block; animation: fadeUp 0.7s ease 0.1s both; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 700;
      color: var(--brown);
      line-height: 1.12;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.7s ease 0.2s both;
    }
    h1 em { color: var(--brown-light); font-style: normal; }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      color: var(--text-light);
      line-height: 1.65;
      max-width: 580px;
      margin: 0 auto 2.2rem;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.7s ease 0.4s both;
    }

    .btn-primary {
      background: var(--brown);
      color: var(--white);
      padding: 0.85rem 2.1rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 18px rgba(107,63,31,0.25);
    }
    .btn-primary:hover { background: var(--brown-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(107,63,31,0.3); }

    .btn-secondary {
      background: var(--white);
      color: var(--brown);
      padding: 0.85rem 2.1rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: background 0.25s, transform 0.2s;
      box-shadow: 0 2px 12px rgba(107,63,31,0.10);
    }
    .btn-secondary:hover { background: var(--butter); transform: translateY(-2px); }

    .hero-hours {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255,255,255,0.7);
      padding: 0.55rem 1.4rem;
      border-radius: 50px;
      font-size: 0.88rem;
      color: var(--text-light);
      font-weight: 700;
      animation: fadeUp 0.7s ease 0.5s both;
      backdrop-filter: blur(4px);
    }
    .hero-hours .dot { width: 8px; height: 8px; background: var(--mint-dark); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── SECTION COMMONS ─── */
    section { padding: 5.5rem 1.5rem; }
    .section-tag {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown-light);
      background: var(--butter);
      padding: 0.3rem 1rem;
      border-radius: 50px;
      margin-bottom: 0.9rem;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      color: var(--brown);
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .section-intro {
      max-width: 600px;
      color: var(--text-light);
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .section-center { text-align: center; margin: 0 auto; }

    /* ─── ABOUT ─── */
    #about { background: var(--white); }
    .about-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }
    .about-visual {
      position: relative;
    }
    .about-card {
      background: linear-gradient(135deg, var(--rose) 0%, var(--butter) 100%);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(107,63,31,0.12);
      position: relative;
      overflow: hidden;
    }
    .about-card::before {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      top: -60px; right: -60px;
    }
    .about-card-emoji { font-size: 4rem; display: block; margin-bottom: 1rem; }
    .about-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--brown);
      margin-bottom: 0.5rem;
    }
    .about-card p { color: var(--text-light); font-size: 0.95rem; line-height: 1.6; }

    .about-since {
      position: absolute;
      bottom: -16px; right: 24px;
      background: var(--brown);
      color: var(--white);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.6rem 1.4rem;
      border-radius: 50px;
      box-shadow: 0 4px 16px rgba(107,63,31,0.25);
    }

    .about-text .section-tag { display: inline-block; }
    .about-text p {
      color: var(--text-light);
      line-height: 1.75;
      font-size: 1.02rem;
      margin-bottom: 1.2rem;
    }
    .about-highlights {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .highlight-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--cream);
      padding: 0.65rem 1.1rem;
      border-radius: 12px;
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 600;
    }
    .highlight-item .hi { font-size: 1.2rem; }

    /* ─── OFFERINGS ─── */
    #offerings { background: var(--cream); }
    .offerings-header { text-align: center; margin-bottom: 3.5rem; }
    .cards-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
    }
    .offering-card {
      background: var(--white);
      border-radius: 20px;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 4px 24px rgba(107,63,31,0.07);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .offering-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 0 0 20px 20px;
    }
    .offering-card.c1::after { background: var(--rose-dark); }
    .offering-card.c2::after { background: var(--butter-dark); }
    .offering-card.c3::after { background: var(--mint-dark); }
    .offering-card.c4::after { background: var(--lavender); }

    .offering-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(107,63,31,0.14); }
    .card-icon { font-size: 2.6rem; margin-bottom: 1rem; display: block; }
    .offering-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--brown);
      margin-bottom: 0.65rem;
    }
    .offering-card p { color: var(--text-light); font-size: 0.95rem; line-height: 1.65; }

    /* ─── SPECIAL ORDER BANNER ─── */
    .special-banner {
      max-width: 1100px;
      margin: 3rem auto 0;
      background: linear-gradient(135deg, var(--butter) 0%, var(--rose) 100%);
      border-radius: 20px;
      padding: 2.2rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 4px 24px rgba(107,63,31,0.10);
    }
    .special-banner .sb-icon { font-size: 2.8rem; flex-shrink: 0; }
    .special-banner h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--brown);
      margin-bottom: 0.3rem;
    }
    .special-banner p { color: var(--text-light); font-size: 0.95rem; line-height: 1.6; }

    /* ─── HOURS & LOCATION ─── */
    #visit { background: var(--white); }
    .visit-grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    .visit-box {
      background: var(--cream);
      border-radius: 20px;
      padding: 2.2rem;
    }
    .visit-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--brown);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .hours-list { list-style: none; }
    .hours-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px dashed var(--butter-dark);
      font-size: 0.95rem;
      color: var(--text-light);
    }
    .hours-list li:last-child { border-bottom: none; }
    .hours-list li span:first-child { font-weight: 700; color: var(--text); }
    .closed { color: var(--rose-dark) !important; }

    .address-block { margin-top: 1rem; }
    .address-block p {
      color: var(--text-light);
      font-size: 0.98rem;
      line-height: 1.8;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .address-block .addr-icon { font-size: 1.2rem; margin-top: 2px; }

    .map-placeholder {
      background: linear-gradient(135deg, var(--mint) 0%, var(--lavender) 100%);
      border-radius: 16px;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: var(--brown-light);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .map-placeholder:hover { opacity: 0.85; }
    .map-placeholder .map-icon { font-size: 2rem; }

    /* ─── SOCIAL ─── */
    #social { background: linear-gradient(135deg, var(--lavender) 0%, var(--rose) 100%); }
    .social-inner { max-width: 700px; margin: 0 auto; text-align: center; }
    .social-inner p {
      color: var(--text-light);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.8rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(107,63,31,0.15);
    }
    .social-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(107,63,31,0.2); }
    .fb-btn { background: #1877f2; color: #fff; }
    .ig-btn { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }
    .social-btn .s-icon { font-size: 1.2rem; }

    /* ─── CONTACT ─── */
    #contact { background: var(--cream); }
    .contact-inner {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 3.5rem;
      align-items: start;
    }
    .contact-info h2 { margin-bottom: 0.8rem; }
    .contact-info p {
      color: var(--text-light);
      line-height: 1.7;
      font-size: 1rem;
      margin-bottom: 1.8rem;
    }
    .contact-detail {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.98rem;
    }
    .contact-detail .cd-icon {
      width: 42px; height: 42px;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 2px 10px rgba(107,63,31,0.10);
      flex-shrink: 0;
    }
    .contact-detail span { color: var(--text-light); }
    .contact-detail a { color: var(--brown); text-decoration: none; font-weight: 700; }
    .contact-detail a:hover { text-decoration: underline; }

    .contact-form-wrap {
      background: var(--white);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 8px 40px rgba(107,63,31,0.09);
    }
    .contact-form-wrap h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--brown);
      margin-bottom: 1.5rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1rem; }
    .form-group label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 2px solid var(--butter);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.25s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--brown-light); background: var(--white); }
    .form-group textarea { resize: vertical; min-height: 110px; }

    .btn-submit {
      width: 100%;
      background: var(--brown);
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 0.95rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 18px rgba(107,63,31,0.25);
      margin-top: 0.5rem;
      letter-spacing: 0.03em;
    }
    .btn-submit:hover { background: var(--brown-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,63,31,0.3); }

    .form-success {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
    }
    .form-success .fs-icon { font-size: 3rem; margin-bottom: 0.8rem; display: block; }
    .form-success h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--brown);
      margin-bottom: 0.5rem;
    }
    .form-success p { color: var(--text-light); font-size: 0.97rem; }

    /* ─── FOOTER ─── */
    footer {
      background: var(--brown);
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--white);
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: block;
    }
    .footer-tagline {
      font-size: 0.92rem;
      margin-bottom: 1.5rem;
      color: rgba(255,255,255,0.6);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .footer-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--butter); }
    .footer-copy { font-size: 0.83rem; color: rgba(255,255,255,0.45); }

    /* ─── SCROLL REVEAL ─── */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .about-visual { max-width: 400px; margin: 0 auto; }
      .visit-grid { grid-template-columns: 1fr; }
      .contact-inner { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      nav { padding: 0.85rem 1.2rem; }
      section { padding: 4rem 1.2rem; }
      .special-banner { flex-direction: column; text-align: center; }
