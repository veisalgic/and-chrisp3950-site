<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Creek Creamery – Handcrafted Local Ice Cream</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FFF8F0;
      --warm-white: #FFFDF9;
      --caramel: #C97D3A;
      --caramel-dark: #A8641F;
      --strawberry: #E8546A;
      --mint: #4CAF7D;
      --chocolate: #3E2010;
      --text-dark: #2C1A0E;
      --text-mid: #5C3D1E;
      --text-light: #8B6245;
      --shadow: 0 8px 32px rgba(62,32,16,0.12);
      --shadow-sm: 0 2px 12px rgba(62,32,16,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--warm-white);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(255, 248, 240, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid rgba(201,125,58,0.15);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: var(--shadow-sm); }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo .logo-icon {
      width: 40px; height: 40px;
      background: var(--caramel);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .nav-logo span {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--chocolate);
      line-height: 1.2;
    }
    .nav-logo small {
      display: block;
      font-family: 'Nunito', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--caramel);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
    }
    .nav-links a {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-mid);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 2px;
      background: var(--caramel);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--caramel); }
    .nav-links a:hover::after { width: 100%; }

    .nav-cta {
      background: var(--caramel);
      color: #fff !important;
      padding: 8px 20px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.2s !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { background: var(--caramel-dark) !important; transform: translateY(-1px); }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2.5px;
      background: var(--chocolate);
      border-radius: 2px;
      transition: all 0.3s;
    }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      background: linear-gradient(160deg, #FFF0DC 0%, #FFE4C4 40%, #FFDAB0 100%);
      display: flex;
      align-items: center;
      padding: 100px 2rem 60px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,125,58,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -100px; left: -60px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(232,84,106,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-text .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,125,58,0.12);
      color: var(--caramel-dark);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      border: 1.5px solid rgba(201,125,58,0.25);
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 900;
      color: var(--chocolate);
      line-height: 1.15;
      margin-bottom: 1.2rem;
    }
    .hero-text h1 em {
      font-style: italic;
      color: var(--caramel);
    }

    .hero-text p {
      font-size: 1.1rem;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 440px;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--caramel);
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(201,125,58,0.35);
    }
    .btn-primary:hover {
      background: var(--caramel-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,125,58,0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--chocolate);
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      border: 2px solid var(--chocolate);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: var(--chocolate);
      color: #fff;
      transform: translateY(-2px);
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .scoop-container {
      position: relative;
      width: 340px;
      height: 380px;
    }

    .big-circle {
      width: 300px; height: 300px;
      background: linear-gradient(135deg, #FFD199 0%, #FFBA6B 100%);
      border-radius: 50%;
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 20px 60px rgba(201,125,58,0.3);
    }

    .scoop {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 8px 24px rgba(62,32,16,0.18);
    }
    .scoop-1 {
      width: 140px; height: 140px;
      background: linear-gradient(145deg, #F9A8B4, #E8546A);
      top: 0; left: 50%; transform: translateX(-50%);
    }
    .scoop-2 {
      width: 130px; height: 130px;
      background: linear-gradient(145deg, #C8E6C9, #4CAF7D);
      top: 100px; left: 10px;
    }
    .scoop-3 {
      width: 135px; height: 135px;
      background: linear-gradient(145deg, #D7B59A, #8B5E3C);
      top: 100px; right: 10px;
    }

    .cone {
      width: 0;
      height: 0;
      border-left: 80px solid transparent;
      border-right: 80px solid transparent;
      border-top: 160px solid #C97D3A;
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 4px 8px rgba(62,32,16,0.2));
    }
    .cone::after {
      content: '';
      position: absolute;
      top: -160px; left: -80px;
      width: 160px; height: 160px;
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 12px,
        rgba(0,0,0,0.06) 12px, rgba(0,0,0,0.06) 14px
      );
    }

    .floating-tag {
      position: absolute;
      background: #fff;
      border-radius: 12px;
      padding: 8px 14px;
      box-shadow: var(--shadow-sm);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-dark);
      white-space: nowrap;
      animation: float 3s ease-in-out infinite;
    }
    .floating-tag .emoji { margin-right: 4px; }
    .tag-1 { top: 20px; right: -10px; animation-delay: 0s; }
    .tag-2 { bottom: 80px; left: -20px; animation-delay: 1s; }
    .tag-3 { top: 200px; right: -20px; animation-delay: 2s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ── ABOUT ── */
    #about {
      padding: 90px 2rem;
      background: var(--warm-white);
    }
    .about-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }
    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--caramel);
      margin-bottom: 0.8rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--chocolate);
      line-height: 1.25;
      margin-bottom: 1.2rem;
    }
    .section-title em { font-style: italic; color: var(--caramel); }

    .about-text p {
      font-size: 1.05rem;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 1rem;
    }

    .about-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.8rem;
    }
    .value-card {
      background: var(--cream);
      border-radius: 14px;
      padding: 16px;
      border: 1.5px solid rgba(201,125,58,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .value-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-sm); }
    .value-card .v-icon { font-size: 1.6rem; margin-bottom: 8px; }
    .value-card h4 { font-weight: 700; font-size: 0.9rem; color: var(--chocolate); margin-bottom: 4px; }
    .value-card p { font-size: 0.82rem; color: var(--text-light); line-height: 1.5; }

    .about-visual {
      position: relative;
    }
    .about-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 1rem;
    }
    .flavor-card {
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
      transition: transform 0.2s;
    }
    .flavor-card:hover { transform: scale(1.03); }
    .flavor-card .f-emoji { font-size: 2.8rem; margin-bottom: 10px; }
    .flavor-card h3 { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .flavor-card p { font-size: 0.8rem; opacity: 0.8; }
    .fc-pink { background: linear-gradient(145deg, #FFE4E9, #FFCCD3); color: #7A2030; }
    .fc-green { background: linear-gradient(145deg, #E4F5EC, #CCE9D8); color: #1A5C38; }
    .fc-brown { background: linear-gradient(145deg, #F0E4D8, #E2CCBA); color: #4A2010; }
    .fc-yellow { background: linear-gradient(145deg, #FFF8D6, #FFECAA); color: #7A5A00; }
    .about-stat {
      position: absolute;
      background: var(--caramel);
      color: #fff;
      border-radius: 16px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 0.85rem;
      bottom: -20px; right: -10px;
      box-shadow: 0 6px 20px rgba(201,125,58,0.4);
      text-align: center;
    }
    .about-stat strong { display: block; font-size: 1.6rem; }

    /* ── FLAVORS ── */
    #flavors {
      padding: 90px 2rem;
      background: linear-gradient(180deg, #FFF0DC 0%, var(--cream) 100%);
    }
    .flavors-inner { max-width: 1100px; margin: 0 auto; }
    .section-head {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    .section-head p {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 520px;
      margin: 0.8rem auto 0;
      line-height: 1.6;
    }

    .flavors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .flavor-item {
      background: #fff;
      border-radius: 22px;
      padding: 30px 24px;
      border: 2px solid transparent;
      transition: all 0.3s;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      cursor: default;
    }
    .flavor-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      border-radius: 22px 22px 0 0;
    }
    .fi-pink::before { background: linear-gradient(90deg, #E8546A, #FFB3BF); }
    .fi-brown::before { background: linear-gradient(90deg, #6B3A2A, #C97D3A); }
    .fi-green::before { background: linear-gradient(90deg, #4CAF7D, #A8E6C3); }
    .fi-blue::before { background: linear-gradient(90deg, #5B9FD6, #B3D9F5); }
    .fi-yellow::before { background: linear-gradient(90deg, #F5C842, #FFE99A); }
    .fi-purple::before { background: linear-gradient(90deg, #9B59B6, #D6AAED); }

    .flavor-item:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
      border-color: rgba(201,125,58,0.2);
    }
    .fi-emoji { font-size: 2.4rem; margin-bottom: 12px; }
    .flavor-item h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--chocolate);
      margin-bottom: 6px;
    }
    .flavor-item p {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.6;
    }
    .flavor-tag {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.73rem;
      font-weight: 700;
      background: var(--cream);
      color: var(--caramel-dark);
    }

    /* ── TESTIMONIALS ── */
    #reviews {
      padding: 90px 2rem;
      background: var(--warm-white);
    }
    .reviews-inner { max-width: 1100px; margin: 0 auto; }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .review-card {
      background: var(--cream);
      border-radius: 20px;
      padding: 28px;
      border: 1.5px solid rgba(201,125,58,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .review-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .review-card::before {
      content: '\201C';
      font-family: Georgia, serif;
      font-size: 5rem;
      color: rgba(201,125,58,0.2);
      position: absolute;
      top: 8px; left: 18px;
      line-height: 1;
    }

    .stars { color: #F5C842; font-size: 1rem; margin-bottom: 10px; }
    .review-card p {
      font-size: 0.95rem;
      color: var(--text-mid);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .reviewer-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      background: var(--caramel);
      color: #fff;
      flex-shrink: 0;
    }
    .reviewer-info strong { display: block; font-size: 0.88rem; font-weight: 700; color: var(--chocolate); }
    .reviewer-info small { font-size: 0.78rem; color: var(--text-light); }

    .reviews-cta {
      text-align: center;
      margin-top: 2.5rem;
    }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--caramel-dark);
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      border: 2px solid var(--caramel);
      transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--caramel); color: #fff; transform: translateY(-2px); }

    /* ── CONTACT ── */
    #contact {
      padding: 90px 2rem;
      background: linear-gradient(160deg, #3E2010 0%, #5C3D1E 100%);
      color: #fff;
    }
    .contact-inner {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-info .section-label { color: rgba(255,200,120,0.9); }
    .contact-info .section-title { color: #fff; }
    .contact-info .section-title em { color: #FFBA6B; }
    .contact-info p {
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.2rem;
    }
    .contact-item .ci-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .contact-item .ci-text strong {
      display: block;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }
    .contact-item .ci-text a,
    .contact-item .ci-text span {
      color: #FFBA6B;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .contact-item .ci-text a:hover { color: #fff; }

    .contact-form {
      background: rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 32px;
      border: 1.5px solid rgba(255,255,255,0.12);
    }
    .contact-form h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: #fff;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: rgba(255,255,255,0.35); }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #FFBA6B;
      background: rgba(255,255,255,0.15);
    }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-group select option { background: #3E2010; color: #fff; }

    .form-submit {
      width: 100%;
      background: var(--caramel);
      color: #fff;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      margin-top: 0.5rem;
    }
    .form-submit:hover { background: #FFBA6B; transform: translateY(-2px); }

    /* ── FOOTER ── */
    footer {
      background: var(--chocolate);
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 30px 2rem;
    }
    footer .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #FFBA6B;
      display: block;
      margin-bottom: 8px;
    }
    footer p { font-size: 0.85rem; }
    footer a { color: rgba(255,185,107,0.8); text-decoration: none; }
    footer a:hover { color: #FFBA6B; }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    .footer-links a { font-size: 0.85rem; }

    /* ── SCROLL ANIMATIONS ── */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
